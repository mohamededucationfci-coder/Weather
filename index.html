<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather</title>
    <meta name="description" content="Weather" />
    <link rel="stylesheet" href="./css/master.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Start Of Header Section -->
    <header>
      <!-- The First Section -->
      <div class="name">SkyPulse</div>
      <!-- The Second Section -->
      <div class="hero">
        <div class="toggle">
          <div><i class="fa-solid fa-sun" aria-hidden="true"></i></div>
          <div><i class="fa-regular fa-moon" aria-hidden="true"></i></div>
        </div>
        <div class="img">
          <img src="" loading="lazy" alt="this my picture" />
        </div>
      </div>
    </header>
    <!-- End Of Header Section -->

    <!-- Start Of Main Section -->
    <main>
      <div class="up">UP</div>
      <!-- The First Section -->
      <div class="temp-today hidden">
        <!-- The First Section -->
        <div>
          <div class="city">
            <i class="fa-solid fa-location-dot" aria-hidden="true"></i>
            <div class="city-country"></div>
          </div>
          <div class="temperature"></div>
        </div>
        <!-- The Second Section -->
        <div class="temp-status"><img src="" alt="" loading="lazy" /></div>
        <!-- The Third Section -->
        <div class="temp-info">
          <div>
            <div>HUMIDITY</div>
            <div class="humidity-percent"></div>
          </div>
          <div>
            <div>WIND</div>
            <div class="wind-speed"></div>
          </div>
          <div>
            <div>VISIBILITY</div>
            <div class="visibility-distance"></div>
          </div>
          <div>
            <div>UV INDEX</div>
            <div class="uv-index"></div>
          </div>
        </div>
      </div>

      <!-- The Second Section -->
      <div class="temp-today-details hidden">
        <div class="head">Today's Forecast</div>
        <div class="forecast"></div>
      </div>

      <!-- The Third Section -->
      <div class="temp-week hidden">
        <!-- The First Section -->
        <div class="day-forecast">
          <div class="head">3-Day Forecast</div>
          <div class="day-details"></div>
        </div>

        <!-- The Second Section -->
        <div class="statistics">
          <div class="humidity hidden">
            <div class="sec-one-humidity">
              <div class="head-humidity">HUMIDITY</div>
              <div class="icon">
                <i class="fa-solid fa-droplet" aria-hidden="true"></i>
              </div>
            </div>
            <div class="sec-two-humidity"></div>
            <div class="sec-three-humidity"></div>
          </div>
          <div class="uv-index hidden">
            <div class="sec-one-uv">
              <div class="head-uv">UV INDEX</div>
              <div class="icon">
                <i class="fa-solid fa-sun" aria-hidden="true"></i>
              </div>
            </div>
            <div class="sec-two-uv"></div>
          </div>
          <div class="wind hidden">
            <div class="sec-one-wind">
              <div class="head-wind">WIND</div>
              <div class="icon">
                <i class="fa-solid fa-wind" aaria-hidden="true"></i>
              </div>
            </div>
            <div class="sec-two-wind">
              <div class="direction-wind">
                <span>N</span>
                <span>E</span>
                <span>S</span>
                <span>W</span>
              </div>
              <div class="wind-details"></div>
            </div>
          </div>
          <div class="schedule hidden">
            <div>
              <div class="sun">
                <div>SUN SCHEDULE</div>
                <div><i class="fa-regular fa-sun" aria-hidden="true"></i></div>
              </div>
              <div class="rise-set">
                <div>
                  <div>SUNRISE</div>
                  <div class="sunrise"></div>
                </div>
                <div>
                  <div>SUNSET</div>
                  <div class="sunset"></div>
                </div>
              </div>
            </div>
            <div>
              <div class="moon">
                <div>MOON SCHEDULE</div>
                <div><i class="fa-regular fa-moon" aria-hidden="true"></i></div>
              </div>
              <div class="rise-set">
                <div>
                  <div>MOONRISE</div>
                  <div class="moonrise"></div>
                </div>
                <div>
                  <div>MOONSET</div>
                  <div class="moonset"></div>
                </div>
              </div>
            </div>
          </div>
          <div class="map hidden">
            <a href="https://zoom.earth/places/egypt/cairo/"
              ><img src="./649.jpg" alt="Weather Image" loading="lazy"
            /></a>
          </div>
        </div>
      </div>
    </main>
    <!-- End Of Main Section -->

    <!-- Start of Footer Section -->
    <footer>
      <!-- The First Section -->
      <div class="sec-one">
        <div class="name">SkyPulse</div>
        <div>Updated 5 mins ago</div>
      </div>
      <!-- The Second Section -->
      <div class="copyright">
        &copy; <span class="year"></span> Made With Love By Developer Mohamed
        Shehta
      </div>
      <div class="links">
        <a href="https://wa.me/201124931485" target="_blank">
          <i
            style="color: #25d366"
            class="fa-brands fa-whatsapp"
            aria-label="This Is Icon Of Whatsapp"
          ></i
        ></a>
        <a href="https://www.instagram.com/mohamed_shehta_44/" target="_blank"
          ><i
            style="color: #e1306c"
            class="fa-brands fa-instagram"
            aria-label="This Is Icon Of Instagram"
          ></i
        ></a>
        <a href="https://t.me/mohamed4420061" target="_blank">
          <i
            style="color: #0088cc"
            class="fa-brands fa-telegram"
            aria-label="This Is Icon Of Telegram"
          ></i>
        </a>
        <a href="https://github.com/mohamededucationfci-coder" target="_blank">
          <i
            style="color: #24292e"
            class="fa-brands fa-github"
            aria-label="This Is Icon Of Telegram"
          ></i>
        </a>
      </div>
    </footer>
    <!-- End Of Footer Section -->
    <script src="./index.js"></script>
  </body>
</html>
